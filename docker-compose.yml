version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # 1. Setup Service (One-off)
  #    Downloads the AI model to a shared volume.
  # ---------------------------------------------------------------------------
  setup_model:
    image: alpine:latest
    container_name: alphainsights-setup
    volumes:
      - ./backend/setup_model.sh:/setup.sh
      - ollama_downloads:/models
    command: >
      sh -c "apk add --no-cache curl bash && /setup.sh"
    networks:
      - alphainsights-net

  # ---------------------------------------------------------------------------
  # 2. AI Inference Engines (llama.cpp)
  # ---------------------------------------------------------------------------
  text-gen-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: alphainsights-text-gen-cpp
    command: -m /models/LFM2.5-1.2B-Thinking-Q4_K_M.gguf --host 0.0.0.0 --port 8080 -c 8192 --parallel 4
    volumes:
      - ollama_downloads:/models:ro
    ports:
      - "8080:8080"
    networks:
      - alphainsights-net
    depends_on:
      setup_model:
        condition: service_completed_successfully



  # ---------------------------------------------------------------------------
  # 3. Backend API (FastAPI)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alphainsights-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/polymarket
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - OLLAMA_HOST=http://text-gen-cpp:8080 # Legacy variable name, points to new text-gen endpoint
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - alphainsights-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # 4. Frontend UI (Next.js)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alphainsights-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend
    networks:
      - alphainsights-net

  # ---------------------------------------------------------------------------
  # 5. Background Worker (Celery)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alphainsights-worker
    command: celery -A app.worker.celery_app worker --loglevel=info
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/polymarket
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - OLLAMA_HOST=http://text-gen-cpp:8080
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - ./backend:/app
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - alphainsights-net

  # ---------------------------------------------------------------------------
  # 6. Infrastructure (DB, Redis, Nginx)
  # ---------------------------------------------------------------------------
  db:
    image: pgvector/pgvector:pg15
    container_name: alphainsights-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=polymarket
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - alphainsights-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: alphainsights-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - alphainsights-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: alphainsights-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - alphainsights-net

  # ---------------------------------------------------------------------------
  # 7. Test Runner (Playwright)
  # ---------------------------------------------------------------------------
  test-runner:
    build:
      context: ./local_tests
      dockerfile: Dockerfile
    container_name: alphainsights-test-runner
    volumes:
      - ./local_tests:/app
    environment:
      - BASE_URL=http://frontend:3000
    depends_on:
      - frontend
      - backend
      - db
    networks:
      - alphainsights-net
    command: pytest -v --html=report.html --self-contained-html
    profiles: ["test"] # Only start when explicitly requested


networks:
  alphainsights-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  ollama_downloads:
  huggingface_cache:
